name: keep-wagewise-awake-playwright

on:
  schedule:
    # Runs every 30 minutes. GitHub schedules are UTC and may be delayed slightly.
    - cron: "*/30 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Open WageWise app
        env:
          WAGEWISE_APP_URL: ${{ secrets.WAGEWISE_APP_URL }}
          KEEP_AWAKE_TIMEOUT_MS: "60000"
          KEEP_AWAKE_SETTLE_SECONDS: "20"
        run: python scripts/keep_wagewise_awake_playwright.py
